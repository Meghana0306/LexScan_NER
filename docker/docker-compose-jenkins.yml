version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-local
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Mount the Docker daemon socket from the host to enable running Docker inside Jenkins
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
    restart: unless-stopped

volumes:
  jenkins_data:
