#version: "3.9"

# Production — Pull pre-built images from GHCR
# Usage: REGISTRY=ghcr.io IMAGE_OWNER=yourusername IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-Meghana0306}/lexscan-ner-api:${IMAGE_TAG:-latest}
    container_name: ner_api_prod
    ports:
      - "8000:8000"
    volumes:
      - models_prod:/app/models
      - data_prod:/app/data
      - logs_prod:/app/logs
    env_file:
      - path: .env
        required: false
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_RELOAD: "0"
      NER_SKIP_BOOTSTRAP: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  ui:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-Meghana0306}/lexscan-ner-ui:${IMAGE_TAG:-latest}
    container_name: ner_ui_prod
    ports:
      - "7860:7860"
    volumes:
      - models_prod:/app/models
      - data_prod:/app/data
      - logs_prod:/app/logs
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: "http://api:8000"
      APP_HOST: "0.0.0.0"
      APP_PORT: "7860"
      NER_SKIP_BOOTSTRAP: "1"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7860/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  models_prod:
  data_prod:
  logs_prod: 