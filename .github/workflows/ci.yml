# Pipeline 1 — CI: tests and lint on every push/PR
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docker.txt

      - name: Install lint tools
        run: pip install flake8

      - name: Flake8
        run: |
          flake8 . \
            --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,logs,outputs,mlruns,models,data,.git

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-docker.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-docker.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu
          python -m spacy download en_core_web_sm
          pip install pytest pytest-asyncio

      - name: Unit tests
        run: pytest tests/unit -q --tb=short

      - name: Integration tests
        run: pytest tests/integration -q --tb=short

      - name: Performance smoke
        run: pytest tests/performance/test_speed.py -q --tb=short
